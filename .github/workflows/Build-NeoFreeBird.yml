name: Build NeoFreeBird

on:
  workflow_dispatch:
    inputs:
      decrypted_ipa_url:
        description: "Direct URL of the decrypted Twitter/X IPA"
        required: true
        type: string
      sdk_version:
        description: "iOS SDK Version for Theos"
        default: "16.5"
        required: true
        type: string
      target_version:
        description: "Target iOS Version for Theos"
        default: "14.0"
        required: true
        type: string
      repo_commit:
        description: "(Optional) Commit/branch/tag for NeoFreeBird/app"
        default: ""
        required: false
        type: string
      tweak_commit:
        description: "(Optional) Commit/branch/tag for NeoFreeBird/tweak"
        default: ""
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-inject:
    name: Build NeoFreeBird
    runs-on: macos-latest
    permissions:
      contents: write

    defaults:
      run:
        shell: bash

    env:
      THEOS: ${{ github.workspace }}/theos
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          repository: NeoFreeBird/app
          path: main
          ref: ${{ inputs.repo_commit != '' && inputs.repo_commit || 'main' }}
          submodules: recursive

      - name: Checkout tweak repo
        uses: actions/checkout@v4
        with:
          repository: NeoFreeBird/tweak
          path: tweak
          ref: ${{ inputs.tweak_commit != '' && inputs.tweak_commit || 'master' }}
          submodules: recursive

      - name: Install Homebrew dependencies
        run: |
          set -euxo pipefail
          brew install make dpkg ldid wget rsync unzip zip
          brew --prefix
          which make || true
          which gmake || true
          which wget
          which ldid

      - name: Add GNU Make to PATH
        run: |
          set -euxo pipefail
          echo "$(brew --prefix make)/libexec/gnubin" >> "$GITHUB_PATH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cyan
        run: |
          set -euxo pipefail
          python --version
          python -m pip install --upgrade pip
          python -m pip install --force-reinstall "https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip"
          which cyan || true
          python -m pip show pyzule-rw || true

      - name: Download Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Verify Theos checkout
        run: |
          set -euxo pipefail
          test -d "${THEOS}"
          ls -la "${THEOS}"
          test -f "${THEOS}/makefiles/common.mk"

      - name: Download iOS SDK
        run: |
          set -euxo pipefail

          rm -rf sdks
          git clone -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/ sdks
          cd sdks
          git sparse-checkout init --no-cone
          git sparse-checkout set "iPhoneOS${{ inputs.sdk_version }}.sdk"
          git checkout

          test -d "iPhoneOS${{ inputs.sdk_version }}.sdk"

          mkdir -p "${THEOS}/sdks"
          rm -rf "${THEOS}/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk"
          mv "iPhoneOS${{ inputs.sdk_version }}.sdk" "${THEOS}/sdks/"

          test -d "${THEOS}/sdks/iPhoneOS${{ inputs.sdk_version }}.sdk"
          ls -la "${THEOS}/sdks"

      - name: Prepare Twitter/X IPA
        run: |
          set -euxo pipefail

          mkdir -p "${GITHUB_WORKSPACE}/main/packages"
          rm -rf "${GITHUB_WORKSPACE}/main/tmp"
          mkdir -p "${GITHUB_WORKSPACE}/main/tmp"

          wget "$IPA_URL" --no-verbose -O "${GITHUB_WORKSPACE}/main/packages/com.atebits.Tweetie2.ipa"
          test -f "${GITHUB_WORKSPACE}/main/packages/com.atebits.Tweetie2.ipa"

          unzip -q "${GITHUB_WORKSPACE}/main/packages/com.atebits.Tweetie2.ipa" -d "${GITHUB_WORKSPACE}/main/tmp"

          APP_PATH="${GITHUB_WORKSPACE}/main/tmp/Payload/Twitter.app"
          test -d "$APP_PATH"
          test -f "$APP_PATH/Info.plist"

          X_VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Info.plist")"
          echo "X_VERSION=$X_VERSION" >> "$GITHUB_ENV"
          echo "X_VERSION=$X_VERSION"

          ls -la "${GITHUB_WORKSPACE}/main/tmp/Payload"
          ls -la "$APP_PATH" | head -100
        env:
          IPA_URL: ${{ inputs.decrypted_ipa_url }}

      - name: Verify tweak files
        run: |
          set -euxo pipefail
          ls -la "${GITHUB_WORKSPACE}/tweak"
          test -f "${GITHUB_WORKSPACE}/tweak/Makefile"
          sed -n '1,120p' "${GITHUB_WORKSPACE}/tweak/Makefile"

      - name: Build tweak with Theos
        run: |
          set -euxo pipefail

          cd "${GITHUB_WORKSPACE}/tweak"
          sed -i '' "s/^TARGET.*$/TARGET := iphone:clang:${{ inputs.sdk_version }}:${{ inputs.target_version }}/" Makefile

          echo "Updated Makefile TARGET:"
          grep '^TARGET' Makefile || true

          make clean package

          echo "Built packages:"
          find . -type f -name "*.deb" -print

      - name: Copy deb to main/packages
        run: |
          set -euxo pipefail

          mkdir -p "${GITHUB_WORKSPACE}/main/packages"
          find "${GITHUB_WORKSPACE}/tweak" -type f -name "*.deb" -exec cp {} "${GITHUB_WORKSPACE}/main/packages/" \;

          echo "Files in main/packages after copy:"
          ls -lh "${GITHUB_WORKSPACE}/main/packages"

          DEB_COUNT="$(find "${GITHUB_WORKSPACE}/main/packages" -maxdepth 1 -type f -name '*.deb' | wc -l | tr -d ' ')"
          test "$DEB_COUNT" -ge 1

      - name: Apply patches and inject tweak
        run: |
          set -euxo pipefail

          WORKROOT="${GITHUB_WORKSPACE}"
          APP_DIR="${WORKROOT}/main/tmp/Payload/Twitter.app"
          PATCH_SRC="${WORKROOT}/main/assets/main"
          PKG_DIR="${WORKROOT}/main/packages"
          TEMP_IPA="${PKG_DIR}/temp.ipa"
          OUT_IPA="${PKG_DIR}/NeoFreeBird_${{ github.run_id }}_${X_VERSION}.ipa"
          OUT_TIPA="${PKG_DIR}/NeoFreeBird_${{ github.run_id }}_${X_VERSION}.tipa"

          test -d "$APP_DIR"
          mkdir -p "$PKG_DIR"

          if [ -d "$PATCH_SRC" ]; then
            echo "Applying patches from $PATCH_SRC"
            rsync -av "$PATCH_SRC/" "$APP_DIR/"
          else
            echo "No patch directory found at $PATCH_SRC"
          fi

          DEB_FILE="$(find "$PKG_DIR" -maxdepth 1 -type f -name '*.deb' | head -n1)"
          if [ -z "$DEB_FILE" ]; then
            echo "No .deb file found in $PKG_DIR"
            exit 1
          fi

          echo "Using deb: $DEB_FILE"

          rm -f "$TEMP_IPA"
          cd "${WORKROOT}/main/tmp"
          zip -qr "$TEMP_IPA" Payload
          test -f "$TEMP_IPA"

          cd "$WORKROOT"
          cyan -i "$TEMP_IPA" -f "$DEB_FILE" -o "$OUT_IPA"

          test -f "$OUT_IPA"
          cp "$OUT_IPA" "$OUT_TIPA"
          test -f "$OUT_TIPA"

          echo "Created files:"
          ls -lh "$OUT_IPA" "$OUT_TIPA"

      - name: Pass package names
        id: package_name
        run: |
          set -euxo pipefail
          echo "ipa_package=NeoFreeBird_${{ github.run_id }}_${X_VERSION}.ipa" >> "$GITHUB_OUTPUT"
          echo "tipa_package=NeoFreeBird_${{ github.run_id }}_${X_VERSION}.tipa" >> "$GITHUB_OUTPUT"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: NeoFreeBird-injected-IPA
          path: ${{ github.workspace }}/main/packages/${{ steps.package_name.outputs.ipa_package }}
          if-no-files-found: error

      - name: Upload TIPA
        uses: actions/upload-artifact@v4
        with:
          name: NeoFreeBird-injected-TIPA
          path: ${{ github.workspace }}/main/packages/${{ steps.package_name.outputs.tipa_package }}
          if-no-files-found: error
